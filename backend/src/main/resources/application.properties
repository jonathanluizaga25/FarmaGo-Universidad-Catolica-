# Configuracion de base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/farmago
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Puerto del servidor
server.port=8080
# Nombre de la aplicacion
spring.application.name=FarmaGO
spring.datasource.hikari.read-only=false
springdoc.swagger-ui.enabled=false
springdoc.scalar.enabled=true
springdoc.scalar.path=/scalar
# JWT
jwt.secret=${JWT_SECRET:cambia_esta_clave_en_produccion_es_solo_para_desarrollo_local}
jwt.expiration=86400000